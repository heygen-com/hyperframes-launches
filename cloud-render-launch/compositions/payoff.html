<style>
  @font-face{font-family:'Spline Sans Mono';font-weight:500;font-display:block;src:url(fonts/SplineSansMono-normal-500-latin-53329b.woff2) format('woff2');}
  #pay-root{position:absolute;inset:0;width:1920px;height:1080px;container-type:size;background:#F0EFE9;font-family:'Spline Sans Mono',monospace;}
  #pay-root::before{content:"";position:absolute;inset:0;pointer-events:none;opacity:.5;background:radial-gradient(circle,rgba(38,36,30,.025) 1px,transparent 1px) 0 0/34px 34px;}
  /* six real renders — clean 2-row × 3-col grid, max horizontal space, native 16:9 (no distortion) */
  #pay-root .grid{position:absolute;left:3cqw;right:3cqw;top:50%;transform:translateY(-50%);
    display:grid;grid-template-columns:repeat(3,1fr);gap:1.5cqw;}

    background:linear-gradient(90deg,#3CE6AC,#00E3FF);opacity:.92;}
  /* HyperFrames product lockup reveals into the cleared centre column, then resolves to the HeyGen parent logo */
  #pay-root .logo{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);z-index:4;
    display:flex;flex-direction:column;align-items:center;gap:1.1cqw;text-align:center;}

  /* aspect-ratio reserves the height box synchronously (the SVG has only a viewBox, no width/height,
     so without this GSAP snapshots a 0-height translate at init → logo renders below centre) */
  #pay-root .heygen{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);z-index:5;width:20cqw;aspect-ratio:7778/4607;height:auto;display:block;}
</style>
<script>
(function(){
  const R=(document.currentScript&&document.currentScript.closest('#pay-root'))||document.querySelector('#pay-root');
  if(!R||!window.gsap) return;
  const cards=[...R.querySelectorAll('.t')];           // row-major: [TL,TM,TR, BL,BM,BR]
  const cMid=[cards[1],cards[4]];                       // middle column — clears for the logo
  const logo=R.querySelector('.logo'),heygen=R.querySelector('.heygen');
  // cascade order — column sweep left → right (TL,BL, TM,BM, TR,BR)
  const order=[0,3,1,4,2,5].map(i=>cards[i]);
  window.__timelines=window.__timelines||{};
  const tl=gsap.timeline({paused:true});
  gsap.set(cards,{opacity:0,scale:.92,y:24,transformOrigin:'50% 50%'});
  gsap.set(logo,{opacity:0,scale:.94});
  gsap.set(heygen,{opacity:0,scale:.94});
  order.forEach((el,i)=>{
    tl.to(el,{opacity:1,scale:1,y:0,duration:.5,ease:'power3.out'},0.15+i*0.1);
  });
  // the two centre videos clear; the HyperFrames lockup reveals in the vacated centre column
  tl.to(cMid,{opacity:0,scale:.92,duration:.45,ease:'power2.in',overwrite:'auto'},1.95);
  tl.to(logo,{opacity:1,scale:1,duration:.5,ease:'power3.out'},2.15);
  // ~1s later — brand resolves to the HeyGen parent logo via a ZOOM-THROUGH (Z-axis, never overlap):
  // HF lockup accelerates toward the viewer + blurs out, hard cut at peak blur, HeyGen grows in from behind.
  // Phase 1 — exit: HF pushes forward (scale up, blur in); opacity dims on a separate linear tween.
  tl.to(logo,{scale:1.2,filter:'blur(10px)',duration:.2,ease:'power3.in'},3.25);
  tl.to(logo,{opacity:.15,duration:.2,ease:'none'},3.25);
  // Phase 2 — hard cut at peak velocity/blur: HF gone, HeyGen appears behind the focal plane (matched blur/opacity).
  tl.set(logo,{opacity:0},3.45);
  tl.set(heygen,{opacity:.15,scale:.75,filter:'blur(10px)'},3.45);
  // Phase 3 — entry: HeyGen continues forward, growing into the focal plane and sharpening.
  tl.to(heygen,{opacity:1,scale:1,filter:'blur(0px)',duration:.5,ease:'expo.out'},3.45);
  tl.to({},{duration:.2},4.8);
  window.__timelines["payoff"]=tl;
})();
</script>
