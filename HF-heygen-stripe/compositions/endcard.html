<template id="endcard-template">
  <div id="ec-root" data-composition-id="endcard" data-width="1920" data-height="1080" data-duration="3.5">
    <style>
      #ec-root{ position:relative;width:1920px;height:1080px;overflow:hidden;background:#FFFFFF; }
    </style>
    <!-- plain white screen — same crossfade-in transition (driven by the root timeline); logo added in post -->
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script>
    (function(){
      const tl=gsap.timeline({paused:true});
      tl.to({},{duration:3.5});   // hold white
      window.__timelines=window.__timelines||{};
      window.__timelines["endcard"]=tl;
    })();
    </script>
  </div>
</template>
