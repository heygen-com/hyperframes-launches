<template id="commands-template">
  <div id="cd-root" data-composition-id="commands" data-width="1920" data-height="1080" data-duration="4.1">
    <style>
      @font-face { font-family:'Hanken Grotesk'; font-weight:700; font-display:block;
        src:url(fonts/HankenGrotesk-normal-700-latin-fe1634.woff2) format('woff2'); }
      @font-face { font-family:'ABC Solar Display'; font-weight:700; font-display:block;
        src:url(fonts/ABCSolarDisplay-Bold.otf) format('opentype'); }

      #cd-root{
        --ink:#0A0A0A; --green:#2FD261;
        --f-display:"ABC Solar Display","Hanken Grotesk",system-ui,sans-serif;
        position:relative;width:1920px;height:1080px;overflow:hidden;
        background:#FBC24A;container-type:size;font-family:var(--f-display)}
      #cd-root *,#cd-root *::before,#cd-root *::after{box-sizing:border-box}

      #cd-root .bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0}

      /* "Three commands" — big black display, two lines, the orb rides the end of "commands" */
      #cd-root .wrap{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);z-index:3;
        text-align:center;will-change:transform,opacity}
      #cd-root .claim{font-weight:700;font-size:11vw;letter-spacing:-0.03em;line-height:0.94;color:var(--ink);
        white-space:nowrap;position:relative;display:inline-block;will-change:transform}
      #cd-root .row2{position:relative;display:inline-block}

      /* green play-orb mascot: rounded triangle + a white eye */
      #cd-root .orb{position:absolute;width:9cqw;height:9cqw;z-index:4;left:0;top:0;will-change:transform,opacity}
      #cd-root .orb svg{width:100%;height:100%;display:block;filter:drop-shadow(0 6px 14px rgba(0,0,0,.18))}
    </style>

    <img class="bg" src="assets/bg-stripe.png" alt="">

    <div class="wrap" id="wrap">
      <div class="claim">Three</div>
      <div class="claim row2" id="row2">commands<span id="anchor" style="position:absolute;right:-1cqw;bottom:0.4cqw;width:1px;height:1px"></span></div>
    </div>

    <div class="orb" id="orb">
      <svg viewBox="0 0 254 252" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M59.1646 96.8772C56.1702 85.4379 68.3552 75.9932 78.6861 81.7463L156.899 125.302C173.335 134.455 174.17 157.791 158.43 168.096L118.704 194.103C104.399 203.468 85.1231 196.045 80.7933 179.504L59.1646 96.8772Z" fill="#35C838" stroke="white" stroke-width="3.6644" />
        <circle cx="132.136" cy="147.269" r="22.4553" transform="rotate(127.045 132.136 147.269)" fill="white" />
        <rect x="114.158" y="136.253" width="3.35644" height="6.60985" rx="1.67822" fill="#151515" />
        <rect x="123.669" y="136.245" width="3.35644" height="6.60985" rx="1.67822" fill="#151515" />
      </svg>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script>
    (function(){
      const root=document.querySelector('[data-composition-id="commands"]');
      const wrap=root.querySelector('#wrap'), claim2=root.querySelector('#row2'), orb=root.querySelector('#orb');
      const bg=root.querySelector('.bg');
      const E='power3.out';

      // slow secondary drift on the sunburst so the ground never feels still
      gsap.set(bg,{transformOrigin:'50% 50%'});

      // "Three commands" enters by scaling DOWN from the explode handoff (inverse zoom-through)
      gsap.set(wrap,{opacity:0,scale:1.35,filter:'blur(12px)'});
      // orb starts off-screen at the BOTTOM-RIGHT corner; travels a straight DIAGONAL to the "s".
      // It's a flat triangle — no rotation.
      gsap.set(orb,{opacity:0,left:'98%',top:'124%',rotation:0});

      const tl=gsap.timeline({paused:true,defaults:{ease:E}});
      // slow sunburst zoom/drift across the whole beat (deterministic, seek-safe)
      tl.fromTo(bg,{scale:1.0,xPercent:0,yPercent:0,rotation:0},{scale:1.09,xPercent:-1.8,yPercent:1.2,rotation:0.4,duration:4.1,ease:'none'},0);
      // claim settles in from the explode (motion blur clears as it lands)
      tl.to(wrap,{opacity:1,scale:1,filter:'blur(0px)',duration:.45,ease:'expo.out'},0.1);
      // green orb stays OFF until the "finished launch video" moment, then a quick diagonal
      // fly-in + click + exit — on screen only ~1s total (like V12's green cursor). film 8.8 + local.
      // fly-in starts ~film 11.85 (local 3.05), lands on the "s", clicks on "video" (~film 12.6 = local 3.8).
      tl.to(orb,{keyframes: { "0%": {
        opacity: 1,
        x: -25,
        y: -44,
        width: 411,
        height: 324
      }, "100%": { opacity: 1, x: -63, y: -72, width: 411, height: 324 }, easeEach: "none" },duration:.2,ease: "none"},3.05);
      tl.to(orb,{left:'60.5%',top:'56%',duration:.5,ease:E},3.05);
      // CLICK exactly on "video" (~film 12.6 = local 3.8) — quick press + release
      tl.to(orb,{scale:0.8,duration:.1,ease:'power2.in',transformOrigin:'30% 30%'},3.78);
      tl.to(wrap,{scale:0.96,duration:.1,ease:'power2.in'},3.80);          // whole "Three commands" presses
      tl.to(orb,{scale:1,duration:.12,ease:'power2.out',transformOrigin:'30% 30%'},3.90);   // release
      tl.to(wrap,{scale:1,duration:.12,ease:'power2.out'},3.91);
      // right after the click, EVERYTHING swipes off left with motion blur (hands off to the terminal at 12.9)
      tl.to([wrap,orb],{xPercent:-220,filter:'blur(10px)',duration:.2,ease:'power3.in'},3.92);

      window.__timelines=window.__timelines||{};
      window.__timelines["commands"]=tl;
      const q=new URLSearchParams(location.search);
      if(q.has('t')){tl.seek(parseFloat(q.get('t'))||0);}
      else if(q.get('dev')==='1'){tl.play();}
    })();
    </script>
  </div>
</template>
