<template id="aroll-rise-template">
  <div id="ar-root" data-composition-id="aroll-rise" data-width="1920" data-height="1080" data-duration="3.3">
    <style>
      #ar-root{ --green:#35C838;
        position:relative;width:1920px;height:1080px;overflow:hidden;
        background:#0A0C0B;container-type:size}
      #ar-root *,#ar-root *::before,#ar-root *::after{box-sizing:border-box}
      #ar-root .bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0}
      #ar-root .stage{position:absolute;inset:0;display:grid;place-items:center;z-index:3}
      #ar-root .aroll{position:relative;width:88cqw;height:82cqh;border-radius:1.4cqw;overflow:hidden;
        background:#111;box-shadow:0 30px 90px -30px rgba(0,0,0,.7);will-change:transform,opacity}
      #ar-root .aroll .photo{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
      #ar-root .aroll .ring{position:absolute;inset:0;border-radius:1.4cqw;pointer-events:none;
        border:0.3cqw solid var(--green);box-shadow:0 0 2.2cqw rgba(47,210,97,.5), inset 0 0 1.4cqw rgba(47,210,97,.3)}
    </style>
    <video class="bg" id="ar-bg" src="assets/bg-dev-loop.mp4" muted playsinline data-start="0" data-duration="3.3" data-media-start="32.25" data-track-index="0"></video>
    <div data-hf-studio-original-inline-translate="" data-hf-studio-original-translate="" data-hf-studio-path-offset="true" style="--hf-studio-offset-x:-48px;--hf-studio-offset-y:0px;translate:var(--hf-studio-offset-x, 0px) var(--hf-studio-offset-y, 0px)" class="stage">
      <div class="aroll" id="aroll">
        <video data-hf-studio-original-inline-translate="" data-hf-studio-original-translate="" data-hf-studio-path-offset="true" style="--hf-studio-offset-x:0px;--hf-studio-offset-y:2px;translate:var(--hf-studio-offset-x, 0px) var(--hf-studio-offset-y, 0px)" class="photo" id="ar-video" src="assets/aroll-v7-close.mp4" muted playsinline data-start="0" data-duration="3.3" data-track-index="1"></video>
        <div class="ring"></div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script>
    (function(){
      const root=document.querySelector('[data-composition-id="aroll-rise"]');
      const aroll=root.querySelector('#aroll');
      const E='power3.out';
      gsap.set(aroll,{yPercent:120,opacity:1});      // starts below frame
      const tl=gsap.timeline({paused:true,defaults:{ease:E}});
      // SLIDES UP into final position by 0.45s — fully on screen BEFORE he says "Now agents…" (which starts at 0.45)
      tl.to(aroll,{keyframes: { "0%": { yPercent: 120, x: 48, y: -4 }, "100%": { yPercent: 0 }, easeEach: "power3.out" },duration:.45,ease: "none"},0.0);
      // then he delivers the line, holds; video freezes its last frame and the whole window fades to white together (endcard crossfade)
      tl.to({},{duration:.1},3.2);
      window.__timelines=window.__timelines||{};
      window.__timelines["aroll-rise"]=tl;
      const q=new URLSearchParams(location.search);
      if(q.has('t')){tl.seek(parseFloat(q.get('t'))||0);}
      else if(q.get('dev')==='1'){tl.play();}
    })();
    </script>
  </div>
</template>
