    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        var COMP_ID = "act-1-cold-open";
        var root = document.querySelector('[data-composition-id="' + COMP_ID + '"]');
        var morphBox = root.querySelector(".morph-box");
        var ctaContent = root.querySelector(".cta-content");
        var termContent = root.querySelector(".term-content");
        var mainCursor = root.querySelector(".mc-main");
        var terms = [
          morphBox,
          root.querySelector(".term-cursor"),
          root.querySelector(".term-codex"),
          root.querySelector(".term-gemini"),
        ];
        var prompts = root.querySelectorAll(".prompt");
        var carets = root.querySelectorAll(".caret");
        var cuHint = root.querySelector(".cu-hint");
        var gePlaceholder = root.querySelector(".ge-placeholder");
        var phraseWords = root.querySelectorAll(".phrase-word");
        var yeahh = root.querySelector(".yeahh-wrap");
        var stars = root.querySelectorAll(".star");
        var flash = root.querySelector(".flash");

        // Only Claude (TL) and Codex (BL) have real send buttons to click
        var clickCursors = [
          root.querySelector(".mc-tl"),
          root.querySelector(".mc-bl"),
        ];
        var ripples = [
          root.querySelector(".cr-tl"),
          root.querySelector(".cr-bl"),
        ];
        var sentBubbles = [
          root.querySelector(".sm-claude"),
          root.querySelector(".sm-cursor"),
          root.querySelector(".sm-codex"),
          root.querySelector(".sm-gemini"),
        ];

        // Hide prompts with clipPath (typed via steps() ease)
        prompts.forEach(function (p) {
          p.textContent = p.dataset.target || "";
          gsap.set(p, { clipPath: "inset(0 100% 0 0)", webkitClipPath: "inset(0 100% 0 0)" });
        });

        // Hide all secondary terminals
        gsap.set(terms[1], { opacity: 0, scale: 1.0, x: 0, y: 0, rotation: 0 });
        gsap.set(terms[2], { opacity: 0, scale: 1.0, x: 0, y: 0, rotation: 0 });
        gsap.set(terms[3], { opacity: 0, scale: 1.0, x: 0, y: 0, rotation: 0 });

        window.__timelines = window.__timelines || {};
        var tl = gsap.timeline({ paused: true });

        /* ════ PHASE 1: CTA — type the npx command character by character ══ */
        var ctaCmd = root.querySelector(".cta-cmd");
        var ctaCaret = root.querySelector(".cta-caret");
        var ctaFullText = "npx skills add heygen-com/hyperframes";
        // Set full text invisible via clipPath so characters appear via steps() easing (seek-safe)
        ctaCmd.textContent = ctaFullText;
        gsap.set(ctaCmd, { clipPath: "inset(0 100% 0 0)", webkitClipPath: "inset(0 100% 0 0)" });

        // Caret blink (background blinking, paused during typing itself so it stays visible)
        tl.to(ctaCaret, { opacity: 0, duration: 0.15 }, 0.20);
        tl.to(ctaCaret, { opacity: 1, duration: 0.15 }, 0.40);

        // 0.45–1.35s: TYPE the command (steps easing gives true char-by-char)
        tl.to(ctaCmd, {
          clipPath: "inset(0 0% 0 0)", webkitClipPath: "inset(0 0% 0 0)",
          duration: 0.90,
          ease: "steps(" + ctaFullText.length + ")",
        }, 0.45);

        // Brief pause (caret blinks once to indicate 'ready to submit')
        tl.to(ctaCaret, { opacity: 0, duration: 0.15 }, 1.38);
        tl.to(ctaCaret, { opacity: 1, duration: 0.15 }, 1.53);

        // 1.65s: ENTER — CTA text flies UP & fades (like sending a terminal message)
        tl.to(ctaContent, { y: -50, scale: 1.02, opacity: 0, duration: 0.28, ease: "power2.out" }, 1.65);
        tl.to(morphBox, { scale: 0.98, duration: 0.12, ease: "power2.in" }, 1.65);
        tl.to(morphBox, { scale: 1.0, duration: 0.10, ease: "power2.out" }, 1.77);

        // Cursor enters from right, drifts toward button, clicks
        tl.fromTo(mainCursor, { opacity: 0, x: 220, y: 140 }, { opacity: 1, x: 40, y: 30, duration: 0.55, ease: "power2.out" }, 0.80);
        tl.to(mainCursor, { x: 0, y: 0, duration: 0.45, ease: "power2.inOut" }, 1.25);
        tl.to(mainCursor, { scale: 0.9, duration: 0.08, ease: "power2.in" }, 1.65);
        tl.to(mainCursor, { scale: 1, opacity: 0, duration: 0.12 }, 1.74);

        /* ════ PHASE 2: MORPH — CTA (wide 1720×180) shrinks to terminal (1400×780) ══ */
        tl.to(morphBox, { height: 780, width: 1400, duration: 0.45, ease: "power3.inOut" }, 1.75);
        tl.to(termContent, { opacity: 1, duration: 0.30, ease: "power2.out" }, 1.98);

        /* ════ PHASE 3: PANEL TYPING (stacking) ════ */
        // Panel 1 Claude Code typing — compressed to 1.05s so it finishes before Panel 2 enters at 3.30
        var p1 = prompts[0]; var n1 = p1.dataset.target.length;
        tl.to(p1, { clipPath: "inset(0 0% 0 0)", webkitClipPath: "inset(0 0% 0 0)", duration: 1.05, ease: "steps(" + n1 + ")" }, 2.15);
        tl.to(carets[0], { opacity: 1, duration: 0.12 }, 3.20);

        // Panel 2 Cursor enters at 3.30 (sync with VO "Brand video?")
        tl.fromTo(terms[1],
          { opacity: 0, x: 400, y: -80, scale: 0.92, rotation: -8 },
          { opacity: 1, x: -55, y: -28, scale: 0.98, rotation: -4, duration: 0.55, ease: "power3.out" },
          3.30
        );
        tl.to(cuHint, { opacity: 0, duration: 0.2 }, 3.45);
        var p2 = prompts[1]; var n2 = p2.dataset.target.length;
        tl.set(p2, { clipPath: "inset(0 55% 0 0)", webkitClipPath: "inset(0 55% 0 0)" }, 3.30);
        tl.to(p2, { clipPath: "inset(0 0% 0 0)", webkitClipPath: "inset(0 0% 0 0)", duration: 0.90, ease: "steps(" + Math.round(n2 * 0.45) + ")" }, 3.40);
        tl.to(carets[1], { opacity: 1, duration: 0.12 }, 4.30);

        // Panel 3 Codex enters at 4.80 (sync with VO "Social ad?")
        tl.fromTo(terms[2],
          { opacity: 0, x: -400, y: 90, scale: 0.92, rotation: 10 },
          { opacity: 1, x: 50, y: 32, scale: 0.97, rotation: 5, duration: 0.55, ease: "power3.out" },
          4.80
        );
        var p3 = prompts[2]; var n3 = p3.dataset.target.length;
        tl.set(p3, { clipPath: "inset(0 60% 0 0)", webkitClipPath: "inset(0 60% 0 0)" }, 4.80);
        tl.to(p3, { clipPath: "inset(0 0% 0 0)", webkitClipPath: "inset(0 0% 0 0)", duration: 0.80, ease: "steps(" + Math.round(n3 * 0.5) + ")" }, 4.90);
        tl.to(carets[2], { opacity: 1, duration: 0.12 }, 5.70);

        // Panel 4 Gemini enters at 6.40 (sync with VO "Launch clip?")
        tl.fromTo(terms[3],
          { opacity: 0, x: 60, y: -220, scale: 0.92, rotation: -7 },
          { opacity: 1, x: -28, y: 48, scale: 0.96, rotation: -3, duration: 0.55, ease: "power3.out" },
          6.40
        );
        var p4 = prompts[3]; var n4 = p4.dataset.target.length;
        tl.set(p4, { clipPath: "inset(0 50% 0 0)", webkitClipPath: "inset(0 50% 0 0)" }, 6.40);
        tl.to(gePlaceholder, { opacity: 0, duration: 0.18 }, 6.40);
        tl.to(p4, { clipPath: "inset(0 0% 0 0)", webkitClipPath: "inset(0 0% 0 0)", duration: 0.80, ease: "steps(" + Math.round(n4 * 0.55) + ")" }, 6.50);
        tl.to(carets[3], { opacity: 1, duration: 0.12 }, 7.30);

        // Single blink per caret before scatter
        [3.20, 4.30, 5.70, 7.30].forEach(function (t, i) {
          tl.to(carets[i], { opacity: 0, duration: 0.2 }, t + 0.45);
          tl.to(carets[i], { opacity: 1, duration: 0.2 }, t + 0.65);
        });

        /* ════ PHASE 4: CHARGE (shake only) @ 8.00s ════ */
        tl.to([terms[0], terms[1], terms[2], terms[3]], {
          x: "+=3", yoyo: true, repeat: 5, duration: 0.045, ease: "none",
        }, 8.00);

        /* ════ PHASE 5: SCATTER (8.15–8.69) ═════════ */
        tl.to(terms[0], { x: -480, y: -270, rotation: 0, scale: 0.52, duration: 0.20, ease: "power3.out" }, 8.15);
        tl.to(terms[1], { x:  480, y: -270, rotation: 0, scale: 0.52, duration: 0.20, ease: "power3.out" }, 8.15);
        tl.to(terms[2], { x: -480, y:  270, rotation: 0, scale: 0.52, duration: 0.20, ease: "power3.out" }, 8.15);
        tl.to(terms[3], { x:  480, y:  270, rotation: 0, scale: 0.52, duration: 0.20, ease: "power3.out" }, 8.15);
        tl.to([terms[0], terms[1], terms[2], terms[3]], { scale: 0.55, duration: 0.14, ease: "power2.out" }, 8.35);
        tl.to([terms[0], terms[1], terms[2], terms[3]], { scale: 0.52, duration: 0.20, ease: "elastic.out(1, 0.7)" }, 8.49);

        /* ════ PHASE 6: PHRASE — synced to VO "Now — any site becomes video" @ 8.36 ═══ */
        tl.to([terms[0], terms[1], terms[2], terms[3]], { opacity: 0.12, duration: 0.4, ease: "power2.out" }, 8.36);
        tl.to(phraseWords[0], { opacity: 1, filter: "blur(0px)", duration: 0.32, ease: "power2.out" }, 8.45);  // "Now"
        tl.to(phraseWords[1], { opacity: 1, filter: "blur(0px)", duration: 0.35, ease: "power2.out" }, 9.00);  // "any site becomes"
        tl.to(phraseWords[2], { opacity: 1, filter: "blur(0px)", duration: 0.4, ease: "power2.out" }, 9.85);   // "video."

        /* ════ PHASE 7: YEAHH (10.40–10.95) ═══ */
        tl.to(phraseWords, { opacity: 0, y: -8, duration: 0.22, ease: "power2.in" }, 10.40);
        tl.to([terms[0], terms[1], terms[2], terms[3]], { opacity: 1, duration: 0.18, ease: "power2.out" }, 10.40);
        tl.fromTo(yeahh, { opacity: 0, scale: 0, rotation: -8 }, { opacity: 1, scale: 1.18, rotation: -3, duration: 0.18, ease: "back.out(2.5)" }, 10.55);
        tl.to(yeahh, { scale: 1.0, duration: 0.1, ease: "power2.out" }, 10.73);
        tl.fromTo(stars, { opacity: 0, scale: 0 }, { opacity: 1, scale: 1, duration: 0.2, stagger: 0.04, ease: "back.out(1.8)" }, 10.55);
        tl.to(yeahh, { opacity: 0, scale: 0.3, duration: 0.18, ease: "power2.in" }, 10.95);
        tl.to(stars, { opacity: 0, duration: 0.14 }, 10.95);

        /* ════ PHASE 8: SENDING ANIMATION ════════════ */
        // Collect send-affordances per terminal (button or input area)
        var inputAreas = [
          root.querySelector(".term-claude .cc-input"),
          root.querySelector(".term-cursor .cu-input-card"),
          root.querySelector(".term-codex .co-input"),
          root.querySelector(".term-gemini .ge-input-line"),
        ];
        var sendAffordances = [
          root.querySelector(".cc-send"),
          root.querySelector(".term-cursor .cu-pill"),
          root.querySelector(".co-send"),
          root.querySelector(".term-gemini .ge-prompt"),
        ];

        // 11.05–11.25: Claude + Codex cursors fade in near their send buttons
        clickCursors.forEach(function (c, i) {
          tl.to(c, { opacity: 1, duration: 0.18, ease: "power2.out" }, 11.05 + i * 0.03);
        });

        // 11.35: cursor click depress
        clickCursors.forEach(function (c) {
          tl.to(c, { scale: 0.92, duration: 0.08, ease: "power2.in" }, 11.35);
          tl.to(c, { scale: 1, duration: 0.12, ease: "power2.out" }, 11.43);
        });

        // 11.35: SEND — typed prompt flies UP + fades
        tl.to(prompts, { y: -40, scale: 1.03, opacity: 0, duration: 0.4, ease: "power2.out" }, 11.35);
        tl.to(carets, { opacity: 0, duration: 0.1 }, 11.35);

        // Input area pulse
        inputAreas.forEach(function (el) {
          if (!el) return;
          tl.to(el, { boxShadow: "0 0 0 2px rgba(255, 255, 255, 0.15) inset", duration: 0.15, ease: "power2.out" }, 11.35);
          tl.to(el, { boxShadow: "0 0 0 0px rgba(255, 255, 255, 0.0) inset", duration: 0.30, ease: "power2.in" }, 11.55);
        });

        // Send affordances punch
        sendAffordances.forEach(function (el) {
          if (!el) return;
          tl.to(el, { scale: 1.2, duration: 0.10, ease: "power2.out" }, 11.35);
          tl.to(el, { scale: 1.0, duration: 0.15, ease: "power2.in" }, 11.46);
        });

        // Ripples under the 2 cursor clicks only
        ripples.forEach(function (r) {
          gsap.set(r, { scale: 0, opacity: 0 });
          tl.to(r, { scale: 1.3, opacity: 0.45, duration: 0.22, ease: "power2.out" }, 11.35);
          tl.to(r, { scale: 2.0, opacity: 0, duration: 0.30, ease: "power2.out" }, 11.52);
        });

        // 11.55: MESSAGE LANDS IN CHAT — bubbles fade/slide in
        sentBubbles.forEach(function (b, i) {
          if (!b) return;
          tl.fromTo(b,
            { opacity: 0, y: 14, scale: 0.94 },
            { opacity: 1, y: 0, scale: 1, duration: 0.28, ease: "back.out(1.4)" },
            11.55 + i * 0.03
          );
        });

        // Cursors fade out after click
        clickCursors.forEach(function (c) {
          tl.to(c, { opacity: 0, duration: 0.18, ease: "power2.in" }, 11.70);
        });
        // Bubbles fade with the flash
        tl.to(sentBubbles, { opacity: 0, duration: 0.15, ease: "power2.in" }, 11.90);

        /* ════ PHASE 9: FLASH (11.92–12.00) ══════════════════════ */
        tl.to(flash, { opacity: 1, duration: 0.05, ease: "none" }, 11.92);
        tl.to(flash, { opacity: 0, duration: 0.18, ease: "power2.out" }, 11.98);

        window.__timelines[COMP_ID] = tl;
      })();
    </script>
