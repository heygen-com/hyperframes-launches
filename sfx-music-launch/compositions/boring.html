<template id="boring-template">
  <!-- "Boring." — giant serif reply beat, modeled on claude-paper's sure-response.
       Enters sliding LEFT from the right so it carries the cursor's leftward sweep
       across the hard cut (leftward cut-the-curve); the root zoom-throughs it out. -->
  <div id="bo-root" data-composition-id="boring" data-width="1920" data-height="1080" data-duration="0.7">
    <style>
      @font-face {
        font-family: 'Galaxie Copernicus';
        font-style: normal;
        font-weight: 400 600;
        font-display: block;
        src: url(fonts/GalaxieCopernicus-Book.woff2) format('woff2');
      }
      @font-face { font-family:'Newsreader';font-style:normal;font-weight:500;font-display:block;
        src:url(fonts/Newsreader-normal-500-latin-f0c28d.woff2) format('woff2');
        unicode-range:U+0000-00FF,U+0131,U+0152-0153,U+02BB-02BC,U+02C6,U+02DA,U+02DC,U+0304,U+0308,U+0329,U+2000-206F,U+20AC,U+2122,U+2191,U+2193,U+2212,U+2215,U+FEFF,U+FFFD; }

      #bo-root{
        --paper:#F0EEE6; --ink:#2B2926;
        --f-serif:"Galaxie Copernicus","Newsreader",Georgia,serif;
        position:relative;width:1920px;height:1080px;overflow:hidden;
        background:var(--paper);container-type:size;color:var(--ink);font-family:var(--f-serif);
      }
      #bo-root *,#bo-root *::before,#bo-root *::after{box-sizing:border-box;margin:0;padding:0}
      #bo-root::before{content:"";position:absolute;inset:0;z-index:0;pointer-events:none;opacity:.5;
        background:radial-gradient(circle, rgba(38,36,30,.025) 1px, transparent 1px) 0 0/34px 34px}

      #bo-root .stage{position:absolute;inset:0;z-index:1;display:grid;place-items:center}
      #bo-root .word{font-family:var(--f-serif);font-weight:500;font-size:15cqw;line-height:1;
        letter-spacing:-.01em;color:var(--ink);will-change:transform,opacity}
    </style>

    <div class="stage">
      <div class="word" id="boWord">Boring.</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script>
    window.__timelines = window.__timelines || {};
    (async function(){
      if (document.fonts && document.fonts.ready) { try { await document.fonts.ready; } catch(e){} }
      const root=document.querySelector('[data-composition-id="boring"]');
      const word=root.querySelector('#boWord');

      // local coords are always 1920-wide (container-type:size) — constant px offset =
      // fixed fraction of the frame at any Studio scale. Enter from the right, sliding LEFT.
      gsap.set(word,{x:210,opacity:0.55,scale:1.045,transformOrigin:'50% 50%'});

      const tl=gsap.timeline({paused:true});
      tl.to(word,{x:0,opacity:1,scale:1,duration:.18,ease:'power3.out'},0);   // snap in fast
      tl.to({},{duration:.52},.18);   // hold; the root inverse zoom-throughs it out

      window.__timelines["boring"]=tl;
      const q=new URLSearchParams(location.search);
      if(q.has('t')) tl.seek(parseFloat(q.get('t'))||0);
      else if(q.get('dev')==='1') tl.play();
    })();
    </script>
  </div>
</template>
