<template id="flex-drop-template">
  <div
    data-composition-id="flex-drop"
    data-width="1920"
    data-height="1080"
    data-start="0"
    data-duration="0.35"
  >
    <div class="drop-bg"></div>
    <div class="drop-text">drop in</div>
    <div class="drop-line"></div>

    <style>
      @import url("https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap");

      [data-composition-id="flex-drop"] {
        width: 1920px; height: 1080px;
        position: relative; overflow: hidden;
        background: #0d1b2a;
      }
      [data-composition-id="flex-drop"] .drop-bg {
        position: absolute; inset: 0;
        background: radial-gradient(ellipse at 50% 60%, #152238 0%, #0d1b2a 100%);
      }
      [data-composition-id="flex-drop"] .drop-text {
        position: absolute;
        top: 50%; left: 50%;
        font-family: "Bebas Neue", sans-serif;
        font-weight: 400;
        font-size: 180px;
        color: #ffffff;
        letter-spacing: 0.04em;
        text-transform: lowercase;
        white-space: nowrap;
      }
      [data-composition-id="flex-drop"] .drop-line {
        position: absolute;
        top: 50%; left: 50%;
        width: 300px; height: 3px;
        background: rgba(255,255,255,0.25);
        border-radius: 2px;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        window.__timelines = window.__timelines || {};
        var tl = gsap.timeline({ paused: true });
        var root = document.querySelector('[data-composition-id="flex-drop"]');
        var text = root.querySelector(".drop-text");
        var line = root.querySelector(".drop-line");

        gsap.set(text, { xPercent: -50, yPercent: -50, y: -300, opacity: 0 });
        gsap.set(line, { xPercent: -50, yPercent: -50, y: 80, scaleX: 0 });

        // Text drops in from above with bounce
        tl.to(text, { y: 0, opacity: 1, duration: 0.25, ease: "back.out(1.2)" }, 0);

        // Impact line at baseline
        tl.to(line, { scaleX: 1, duration: 0.12, ease: "power3.out" }, 0.15);
        tl.to(line, { opacity: 0, scaleX: 1.3, duration: 0.1, ease: "power2.out" }, 0.27);

        window.__timelines["flex-drop"] = tl;
      })();
    </script>
  </div>
</template>
