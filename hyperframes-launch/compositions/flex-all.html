<template id="flex-all-template">
  <div
    data-composition-id="flex-all"
    data-width="1920"
    data-height="1080"
    data-start="0"
    data-duration="0.3"
  >
    <!-- Fast-moving gradient referencing all previous flex palettes -->
    <div class="all-gradient"></div>
    <div class="all-text">all</div>

    <style>
      @import url("https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&display=swap");

      [data-composition-id="flex-all"] {
        width: 1920px; height: 1080px;
        position: relative; overflow: hidden;
        background: #1a1a1a;
      }
      [data-composition-id="flex-all"] .all-gradient {
        position: absolute; inset: -200px;
        background: linear-gradient(
          135deg,
          #e63946 0%,
          #88ce02 14%,
          #4ecdc4 28%,
          #d4586a 42%,
          #d4a0a0 56%,
          #f5a623 70%,
          #ffe14d 84%,
          #457b9d 100%
        );
        background-size: 400% 400%;
      }
      [data-composition-id="flex-all"] .all-text {
        position: absolute;
        top: 50%; left: 50%;
        font-family: "Space Grotesk", sans-serif;
        font-weight: 700;
        font-size: 300px;
        color: #ffffff;
        letter-spacing: -0.04em;
        z-index: 2;
        text-shadow: 0 8px 30px rgba(0,0,0,0.4);
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        window.__timelines = window.__timelines || {};
        var tl = gsap.timeline({ paused: true });
        var root = document.querySelector('[data-composition-id="flex-all"]');
        var grad = root.querySelector(".all-gradient");
        var text = root.querySelector(".all-text");

        gsap.set(text, { xPercent: -50, yPercent: -50 });

        // Gradient sweeps fast
        tl.fromTo(grad,
          { backgroundPosition: "0% 0%" },
          { backgroundPosition: "100% 100%", duration: 0.3, ease: "none" },
          0);

        // Text instant with micro punch
        tl.fromTo(text, { scale: 1.08 }, { scale: 1, duration: 0.15, ease: "power2.out" }, 0);

        // Pad timeline to master slot duration (0.33s) to prevent black frames at beat tail
        tl.to({}, { duration: 0.33 }, 0);

        window.__timelines["flex-all"] = tl;
      })();
    </script>
  </div>
</template>
