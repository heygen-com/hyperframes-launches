<script>
(function(){
  const R=(document.currentScript&&document.currentScript.closest('#ff-root'))||document.querySelector('#ff-root');

  const q=(s)=>R.querySelector(s), qa=(s)=>Array.from(R.querySelectorAll(s));

  const tl=gsap.timeline({paused:true});
  const inner=gsap.timeline();

  gsap.set(q('.pwin'),{opacity:0,scale:.62,y:10});
  gsap.set(q('#ff-pfill'),{scaleX:0.22});

  inner.to(tc,{opacity:0,duration:.4,ease:'steps(1)',repeat:9,yoyo:true},0.3);
  inner.to(tc,{opacity:0,duration:.3,ease:'power2.in'},6.0);

  // player opens

  inner.to(q('.cl1'),{opacity:1,duration:.4},1.7);

  // scrubber + timecode advance — fill scaleX AND knob left% share the same 22%→42%

  inner.to(q('#ff-pknob'),{left:'42%',duration:3.6,ease:'none'},1.9);
  const t2={t:7};

  // ════════ the flow plays inside the screen ════════

  inner.to(q('.striplbl'),{opacity:1,duration:.4,ease:'power2.out'},3.0);

  inner.fromTo(q('#u-video'),{opacity:0,scale:.8,x:20},{opacity:1,scale:1,x:0,duration:.55,ease:'back.out(1.6)'},3.6);

  inner.fromTo(q('.vring'),{opacity:.5,scale:1},{opacity:0,scale:1.8,duration:1.0,ease:'power2.out',repeat:1},4.1);
  inner.to({},{duration:.3},6.1);

  inner.timeScale(2.56);   // compressed: ~6.4s authored → ~2.5s
  tl.add(inner,0);
