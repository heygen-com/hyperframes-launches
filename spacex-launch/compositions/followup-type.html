      <div class="msg">Can you break down SpaceX's upcoming IPO?</div>
      <div class="resp" id="resp">
        <p>Good question — with one caveat up front: <strong>I can't tell you exactly when or at what price SpaceX lists,</strong> and none of this is investment advice. But you asked for the real picture, so let's go properly deep.</p>

        <h2>The big picture</h2>
        <p>SpaceX is really three businesses under one roof: a launch near-monopoly in Falcon 9, a fast-compounding consumer-internet business in Starlink, and a generational moonshot in Starship. First thing to know — the most likely near-term IPO is a <strong>Starlink carve-out</strong>, not all of SpaceX.</p>

        <h2>What actually drives the valuation</h2>
        <ul>
          <li><strong>Starlink subscribers and ARPU.</strong> The cash engine. Subscriber growth and margins are what make an IPO bankable.</li>
          <li><strong>Launch cadence and reusability.</strong> Falcon 9 dominates global launch; cost per kilo is the moat.</li>
          <li><strong>Starship.</strong> The genuine wildcard. Credible orbital reuse re-rates everything; another year of test flights does not.</li>
          <li><strong>Government and defense contracts.</strong> NASA, the Space Force, and national-security launch — high-margin, sticky backlog.</li>
          <li><strong>Capital intensity.</strong> Starbase and Starship burn enormous capex — how they fund it matters.</li>
          <li><strong>Competition.</strong> Kuiper, Blue Origin, and China are all circling Starlink's lead.</li>
          <li><strong>Deal structure.</strong> A Starlink-only listing versus the whole company changes the math entirely.</li>
        </ul>

        <h2>Scenarios</h2>
        <h3>Bull case</h3>
        <ul>
          <li>Starlink turns durably cash-generative and IPOs at a premium.</li>
          <li>Starship reaches reliable reuse and unlocks the heavy-lift narrative.</li>
          <li>The implied valuation re-rates well past four hundred billion.</li>
        </ul>
        <h3>Base case</h3>
        <ul>
          <li>Starlink keeps compounding, Starship keeps progressing, IPO timing slips a bit.</li>
          <li>The secondary valuation drifts toward the four-hundred-billion mark.</li>
        </ul>
        <h3>Bear case</h3>
        <ul>
          <li>Starship delays drag on and Kuiper pressures Starlink margins.</li>
          <li>The listing is postponed and the multiple compresses.</li>
        </ul>

        <h2>Catalysts to watch (roughly in order)</h2>
        <ol>
          <li>Starlink subscriber and free-cash-flow milestones.</li>
          <li>Any concrete Starship orbital reuse — not just a test flight.</li>
          <li>A Starlink S-1 filing or a formal IPO timeline.</li>
          <li>New national-security and commercial launch awards.</li>
          <li>Direct-to-Cell scaling beyond pilots.</li>
        </ol>

        <h2>The risks I'd actually worry about</h2>
        <ul>
          <li>IPO timing itself — it has slipped before and can again.</li>
          <li>Starship slipping — the most expensive risk to the story.</li>
          <li>Key-person and governance overhang.</li>
          <li>Kuiper and Chinese constellations competing on price.</li>
        </ul>

        <h2>How I'd frame valuation</h2>
        <p>Almost none of the value sits in this year's launch revenue. It sits in the terminal value of Starlink's cash flows and Starship's optionality — which is exactly why the credible range is so wide.</p>
        <ul>
          <li>On current launch earnings alone, it looks expensive.</li>
          <li>On a Starlink-cash-machine scenario, it looks cheap.</li>
          <li>Both can be "true" at once — that's the whole game.</li>
        </ul>

        <h2>What I'd track week to week</h2>
        <ul>
          <li>Starlink net adds and the ARPU trend.</li>
          <li>Starship flight cadence and reuse.</li>
          <li>Any concrete IPO filing — not just headlines.</li>
        </ul>

        <h2>Bottom line</h2>
        <p><strong>SpaceX's IPO is less about rockets than about Starlink's cash flows and Starship's optionality.</strong> Frame it around those drivers rather than a single number — the range of credible outcomes is genuinely enormous.</p>
        <p>And honestly? Anyone quoting you a precise IPO valuation is guessing with confidence. I'd rather give you the framework and let the data update it.</p>
        <p>Want me to turn this into a one-page brief with charts, or go deeper on any single driver?</p>
      </div>

      <div class="typearea" id="typearea" data-layout-allow-overflow="true" data-layout-allow-overlap="true">
        <div class="tline"><span class="tw" id="tw1" data-layout-allow-overflow="true"><span class="ttext" id="t1">Ummm... thank you! Would you mind making this</span></span><span class="caret" id="c1"></span></div>
        <div class="tline"><span class="tw" id="tw2" data-layout-allow-overflow="true"><span class="ttext" id="t2">into a video with HyperFrames?</span></span><span class="caret" id="c2"></span></div>
      </div>
      <div class="send" id="send"><svg viewBox="0 0 24 24"><path d="M12 19V5M5 12l7-7 7 7"/></svg></div>
    </div>

    <svg class="cursor" id="cursor" viewBox="0 0 28 28" data-layout-allow-overflow="true">
      <path d="M6 4 L6 23 L11 18 L14.5 25 L17.5 23.6 L14 17 L21 17 Z" fill="#1c1c1c" stroke="#F4F4F0" stroke-width="1.4" stroke-linejoin="round"/>
    </svg>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/CustomEase.min.js"></script>
    <script>
    window.__timelines = window.__timelines || {};
    (async function(){
      if(document.fonts && document.fonts.ready){ try{ await document.fonts.ready; }catch(e){} }
      // build after fonts.ready so offsetWidth metrics are final → widths are baked straight into the
      // reveals (no tl.recent()/tl.invalidate(), which the render-time GSAP batching proxy can't run)
      const root=document.querySelector('[data-composition-id="followup-type"]');
      const plate=root, scroll=root.querySelector('#scroll'), resp=root.querySelector('#resp');
      const composer=root.querySelector('#composer'), ph=root.querySelector('#ph'), cursor=root.querySelector('#cursor'), send=root.querySelector('#send');
      const tw1=root.querySelector('#tw1'), tw2=root.querySelector('#tw2');
      const t1=root.querySelector('#t1'), t2=root.querySelector('#t2');
      const c1=root.querySelector('#c1'), c2=root.querySelector('#c2');

      const L1=t1.textContent.length, L2=t2.textContent.length;
      const PUSH=6.5*19.2;   // composer grows 6.5cqw; push the conversation up by the same so it reacts

      gsap.set([c1,c2],{opacity:0});
      gsap.set(cursor,{transformOrigin:'21% 14%'});

      const E='power3.out';
      // smooth cubic-bezier for the box morph (gentle start + end)
      if(window.CustomEase){ gsap.registerPlugin(CustomEase); CustomEase.create('growBez','0.6, 0, 0.2, 1'); }
      const GROW_EASE = window.CustomEase ? 'growBez' : 'power2.inOut';
      // timeline-level onUpdate via creation vars (NOT tl.eventCallback — unsupported by the render
      // batching proxy). It closes over GROW_AT/GROW_DUR/growEaseFn/maxFrozen declared below; all are
      // initialized by the time the timeline is first seeked/played, so the closure is safe.
      const tl=gsap.timeline({paused:true,defaults:{ease:E},onUpdate:()=>{
        const t=tl.time();
        let p=0; if(t>GROW_AT) p=Math.min(1,(t-GROW_AT)/GROW_DUR);
        gsap.set(scroll,{y:-(maxFrozen+PUSH*growEaseFn(p))});   // cached max → no per-frame reflow pop
      }});

      // measure where response-scroll ended SYNCHRONOUSLY so the scroll set is born at the bottom
      // (no stale y:0 → no 3→4 top-flash); refined again on fonts.ready. visibility:hidden retains layout.
      // transform-independent (offsetTop/offsetHeight are layout px, NOT affected by our own scroll
      // translateY) → safe to call every frame in onUpdate with no feedback loop.
      function measureMax(){
        const bottom = resp.offsetTop + resp.offsetHeight;
        return Math.max(0, bottom - (0.87*1080 - 0.05*1080));
      }
      // freeze the conversation at the bottom. CACHE the max — do NOT re-measure live every frame:
      // re-reading offsetHeight on the frame the section flips visible reflows transiently → a 1–2
      // frame scroll pop (the 3→4 "top of chat" flash). Measured once now (visibility:hidden retains
      // layout) and refreshed on fonts.ready when webfont metrics are final.
      let maxFrozen = measureMax();
      gsap.set(scroll,{y:-maxFrozen});

      // ── the cursor comes back, up from the bottom, to the composer ──
      tl.fromTo(cursor,{left:'13%',top:'116%'},{left:'13%',top:'85%',duration:.7,ease:E},0.0);
      // click the prompt box — ONLY the cursor taps; the box does NOT react (no scale-down)
      tl.to(cursor,{scale:.84,duration:.1,ease:'power2.in'},0.8);
      tl.to(cursor,{scale:1,duration:.22,ease:'power2.out'},0.9);
      // placeholder clears on click; cursor drifts offscreen
      tl.to(ph,{opacity:0,duration:.2},0.85);
      tl.to(cursor,{top:'116%',duration:.55,ease:E},1.05);

      // ── type line 1 in the THIN single-line box; it only grows once the text WRAPS to line 2 ──
      const start1=1.4, TYPE1=L1*0.04, TYPE2=L2*0.04;   // 1.25× faster typing
      tl.set(c1,{opacity:1},start1);
      tl.to(tw1,{width:t1.offsetWidth,duration:TYPE1,ease:`steps(${L1})`},start1);
      const end1=start1+TYPE1;
      tl.set(c1,{opacity:0},end1);
      // WRAP → now grow the input upward (bottom pinned) + push the conversation up, right as line 2 begins
      // start the morph ~0.5s earlier (overlaps line 1's tail) with a longer cubic-bezier ease so it
      // has a smooth start + end and is essentially open by the time line 2 begins (beats the 2nd line)
      tl.to(composer,{top:'81.2%',height:'15cqw',duration:.65,ease:GROW_EASE},end1-0.5);
      // (scroll is driven by the onUpdate below — measured live — not a tween, so render is always correct)
      tl.set(c2,{opacity:1},end1+0.04);
      tl.to(tw2,{width:t2.offsetWidth,duration:TYPE2,ease:`steps(${L2})`},end1+0.04);
      const end2=end1+0.04+TYPE2;
      // caret blinks while the cursor comes back down to the send button
      tl.to(c2,{opacity:0,duration:.5,repeat:2,yoyo:true,ease:'steps(1)'},end2);
      tl.fromTo(cursor,{left:'86%',top:'116%'},{left:'86%',top:'86.5%',duration:.55,ease:E},end2+0.25);
      // click SEND — cursor tap + button press (forward depth)
      const sendT=end2+1.05;
      tl.set(c2,{opacity:0},sendT-0.05);
      tl.to(cursor,{scale:.84,duration:.1,ease:'power2.in'},sendT);
      tl.to(cursor,{scale:1,duration:.22,ease:'power2.out'},sendT+0.1);
      tl.to(send,{scale:.88,duration:.09,ease:'power2.in'},sendT).to(send,{scale:1,duration:.26,ease:'power2.out'},sendT+0.09);
      // hold the sent state — the root timeline plays the inverse zoom-through out of this scene
      tl.to(composer,{opacity:1,duration:.4},sendT+0.5);

      // measure: freeze scroll to match response-scroll's end + set clip widths. Re-run on fonts.ready
      // so webfont metrics are final (otherwise the typed lines clip a few chars short).
      // drive the conversation scroll from onUpdate (FIRES in render, measured live each frame) so the
      // frozen-bottom position is always correct — even though offsetHeight is unmeasurable until the
      // comp is active. This is what fixes the 3→4 top-flash glitch.
      // consumed by the timeline-level onUpdate defined at creation (above). maxFrozen + offsetWidths
      // were measured after fonts.ready, so nothing needs a later re-measure pass.
      const GROW_AT=end1-0.5, GROW_DUR=0.65, growEaseFn=gsap.parseEase(GROW_EASE);

      window.__timelines["followup-type"]=tl;
      const q=new URLSearchParams(location.search);
      if(q.has('t')) tl.seek(parseFloat(q.get('t'))||0);
      else if(q.get('dev')==='1') tl.play();
    })();
    </script>
  </div>
</template>
