<script>
var W = 1920;
var H = 1080;
var PI = Math.PI;
var screenW = 390;
var screenH = 844;

var theaterCanvas = document.getElementById("theater");
var renderer;
var hasWebGL = true;
var glContext = null;
try {
  glContext = theaterCanvas.getContext("webgl", { antialias: true, preserveDrawingBuffer: true })
    || theaterCanvas.getContext("experimental-webgl", { antialias: true, preserveDrawingBuffer: true });
  if (!glContext) throw new Error("WebGL unavailable");
  renderer = new THREE.WebGLRenderer({
    canvas: theaterCanvas,
    context: glContext,
    antialias: true,
    preserveDrawingBuffer: true
  });
  renderer.setSize(W, H, false);
  renderer.setPixelRatio(1);
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.12;
  renderer.outputEncoding = THREE.sRGBEncoding;
  renderer.setClearColor(0x050508, 0);
} catch (e) {
  hasWebGL = false;
}

var scene = new THREE.Scene();
scene.background = null;
var camera = new THREE.PerspectiveCamera(34, W / H, 0.1, 100);

var envCanvas = document.createElement("canvas");
envCanvas.width = 1024;
envCanvas.height = 512;
var envCtx = envCanvas.getContext("2d");
var envGrad = envCtx.createLinearGradient(0, 0, 1024, 512);
envGrad.addColorStop(0, "#020307");
envGrad.addColorStop(0.22, "#1f2937");
envGrad.addColorStop(0.36, "#ffffff");
envGrad.addColorStop(0.52, "#15161a");
envGrad.addColorStop(0.68, "#d7ff3f");
envGrad.addColorStop(0.84, "#28406f");
envGrad.addColorStop(1, "#020307");
envCtx.fillStyle = envGrad;
envCtx.fillRect(0, 0, 1024, 512);
envCtx.globalCompositeOperation = "screen";
envCtx.fillStyle = "rgba(255,255,255,0.18)";
envCtx.fillRect(160, 98, 640, 4);
envCtx.fillRect(0, 280, 760, 3);
envCtx.fillStyle = "rgba(215,255,63,0.12)";
envCtx.fillRect(310, 180, 520, 5);
var envTex = new THREE.CanvasTexture(envCanvas);
envTex.mapping = THREE.EquirectangularReflectionMapping;
if (hasWebGL) {
  var pmrem = new THREE.PMREMGenerator(renderer);
  scene.environment = pmrem.fromEquirectangular(envTex).texture;
  envTex.dispose();
  pmrem.dispose();
}

scene.add(new THREE.AmbientLight(0x222233, 0.55));
var key = new THREE.DirectionalLight(0xffffff, 2.3);
key.position.set(-3.5, 4.5, 5.0);
scene.add(key);
var rim = new THREE.PointLight(0x7c9cff, 3.2, 15);
rim.position.set(4.2, 2.4, 3.0);
scene.add(rim);
var lime = new THREE.PointLight(0xd7ff3f, 1.4, 12);
lime.position.set(-2.8, -0.8, 3.8);
scene.add(lime);

var screenCanvas = document.getElementById("phone-screen");
var screenCtx = screenCanvas.getContext("2d");
var captureStripEl = document.getElementById("heygen-capture-strip");
var screenTex = new THREE.CanvasTexture(screenCanvas);
screenTex.minFilter = THREE.LinearFilter;
screenTex.magFilter = THREE.LinearFilter;
screenTex.generateMipmaps = false;

function roundedRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

function label(ctx, text, x, y, width, height, fill, color) {
  roundedRect(ctx, x, y, width, height, height / 2);
  ctx.fillStyle = fill;
  ctx.fill();
  ctx.fillStyle = color;
  ctx.font = "700 12px Inter, system-ui, sans-serif";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText(text, x + width / 2, y + height / 2);
  ctx.textAlign = "left";
}

function drawFeature(ctx, x, y, w, h, color, title, body) {
  roundedRect(ctx, x, y, w, h, 20);
  ctx.fillStyle = "#ffffff";
  ctx.fill();
  ctx.strokeStyle = "rgba(17,17,17,0.08)";
  ctx.lineWidth = 1;
  ctx.stroke();
  roundedRect(ctx, x + 16, y + 16, 42, 42, 14);
  ctx.fillStyle = color;
  ctx.fill();
  ctx.fillStyle = "#111111";
  ctx.font = "800 19px Inter, system-ui, sans-serif";
  ctx.fillText(title, x + 16, y + 82);
  ctx.fillStyle = "rgba(17,17,17,0.58)";
  ctx.font = "500 13px Inter, system-ui, sans-serif";
  var words = body.split(" ");
  var line = "";
  var lineY = y + 107;
  for (var i = 0; i < words.length; i++) {
    var testLine = line + words[i] + " ";
    if (ctx.measureText(testLine).width > w - 32 && i > 0) {
      ctx.fillText(line, x + 16, lineY);
      line = words[i] + " ";
      lineY += 17;
    } else {
      line = testLine;
    }
  }
  ctx.fillText(line, x + 16, lineY);
}

function drawHeyGenPage(scrollProgress) {
  var ctx = screenCtx;
  ctx.clearRect(0, 0, screenW, screenH);

  if (captureStripEl && captureStripEl.complete && captureStripEl.naturalHeight > screenH) {
    var maxScroll = captureStripEl.naturalHeight - screenH;
    var srcY = Math.max(0, Math.min(maxScroll, scrollProgress * maxScroll));
    ctx.drawImage(captureStripEl, 0, srcY, screenW, screenH, 0, 0, screenW, screenH);
    screenTex.needsUpdate = true;
    return;
  }

  var scroll = scrollProgress * 980;
  ctx.fillStyle = "#f7f4ee";
  ctx.fillRect(0, 0, screenW, screenH);

  var y = -scroll;
  ctx.save();
  ctx.translate(0, y);

  ctx.fillStyle = "#f7f4ee";
  ctx.fillRect(0, 0, screenW, 1800);

  ctx.fillStyle = "#111111";
  ctx.font = "900 22px Inter, system-ui, sans-serif";
  ctx.fillText("HeyGen", 24, 46);
  label(ctx, "Get Started", 264, 20, 102, 34, "#d7ff3f", "#111111");

  ctx.font = "900 48px Inter, system-ui, sans-serif";
  ctx.textBaseline = "alphabetic";
  var headline = ["Turn your", "ideas into", "videos in", "minutes"];
  for (var h = 0; h < headline.length; h++) {
    ctx.fillText(headline[h], 24, 118 + h * 50);
  }

  ctx.fillStyle = "rgba(17,17,17,0.68)";
  ctx.font = "500 16px Inter, system-ui, sans-serif";
  var body = [
    "Go from script, image, presentation,",
    "or PDF to finished video. No cameras,",
    "no crew, no editing skills required."
  ];
  for (var b = 0; b < body.length; b++) {
    ctx.fillText(body[b], 24, 346 + b * 22);
  }

  label(ctx, "AI Video Generator", 24, 420, 154, 38, "#111111", "#f7f4ee");
  label(ctx, "Free to start", 188, 420, 122, 38, "#d7ff3f", "#111111");

  roundedRect(ctx, 24, 494, 342, 226, 28);
  var heroGrad = ctx.createLinearGradient(24, 494, 366, 720);
  heroGrad.addColorStop(0, "#10131c");
  heroGrad.addColorStop(0.5, "#4d78ff");
  heroGrad.addColorStop(1, "#d7ff3f");
  ctx.fillStyle = heroGrad;
  ctx.fill();
  ctx.fillStyle = "rgba(255,255,255,0.92)";
  ctx.font = "800 24px Inter, system-ui, sans-serif";
  ctx.fillText("One-Shot Text-to-Video", 44, 556);
  ctx.font = "600 15px Inter, system-ui, sans-serif";
  ctx.fillText("Type your idea. Click generate.", 44, 590);
  ctx.fillText("Get a share-ready video.", 44, 614);
  roundedRect(ctx, 44, 642, 144, 44, 14);
  ctx.fillStyle = "rgba(255,255,255,0.92)";
  ctx.fill();
  ctx.fillStyle = "#111111";
  ctx.font = "800 14px Inter, system-ui, sans-serif";
  ctx.fillText("Generate", 76, 669);

  ctx.fillStyle = "#111111";
  ctx.font = "850 28px Inter, system-ui, sans-serif";
  ctx.fillText("128M+ videos generated", 24, 784);

function cbz(p1x, p1y, p2x, p2y) {
  var ax = 3 * p1x - 3 * p2x + 1;
  var bx = 3 * p2x - 6 * p1x;
  var cx = 3 * p1x;
  var ay = 3 * p1y - 3 * p2y + 1;
  var by = 3 * p2y - 6 * p1y;
  var cy = 3 * p1y;
  return function(t) {
    var s = t;
    for (var i = 0; i < 12; i++) {
      var x = ((ax * s + bx) * s + cx) * s - t;
      var dx = (3 * ax * s + 2 * bx) * s + cx;
      if (Math.abs(dx) < 1e-10) break;
      s -= x / dx;
    }
    s = Math.max(0, Math.min(1, s));
    return ((ay * s + by) * s + cy) * s;
  };
}

function makeChannelMaterial(fragmentShader, uniforms) {
  return new THREE.ShaderMaterial({
    uniforms: uniforms,
    vertexShader: [
      "varying vec2 vUv;",
      "void main() {",
      "  vUv = uv;",
      "  gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);",
      "}"
    ].join("\n"),
    fragmentShader: fragmentShader,
    transparent: true,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
    side: THREE.DoubleSide
  });
}

    "  gl_FragColor = vec4(0.0, c.g, 0.0, lum * uAlpha);",

  var blueFragShader = [
    "uniform sampler2D uTexture;",
    "uniform float uAlpha;",
    "varying vec2 vUv;",

    "  float lum = c.b * 0.6 + max(c.r, c.g) * 0.4;",

  redPlane = new THREE.Mesh(planeGeom, makeChannelMaterial(redFragShader, redUniforms));
  greenPlane = new THREE.Mesh(planeGeom, makeChannelMaterial(greenFragShader, greenUniforms));

    greenPlane.scale.setScalar(chromaticState.planeScale);

    blueUniforms.uAlpha.value = chromaticState.sceneAlpha;

    chromaticCamera.position.set(chromaticState.camX, chromaticState.camY, chromaticState.camZ);
    chromaticCamera.lookAt(chromaticState.lookX, chromaticState.lookY, 0);

    if (chromaticComposer) {

    } else {

  portalCamera = new THREE.PerspectiveCamera(50, W / H, 0.1, 100);
  portalCamera.position.set(0, 0, 2.8);
  portalCamera.lookAt(0, 0, 0);

  var vFov = portalCamera.fov * Math.PI / 180;
  var quadH = 2 * Math.tan(vFov / 2) * portalCamera.position.z;
  var quadW = quadH * (W / H);

  portalUniforms = {
    tFront: { value: portalFrontTexture },
    portalRadius: { value: 0 },
    portalCenter: { value: new THREE.Vector2(0.5, 0.5) },
    edgeWidth: { value: 0.06 },
    glowColor: { value: new THREE.Vector3(0.486, 0.227, 0.929) },
    glowColor2: { value: new THREE.Vector3(0.290, 0.565, 1.0) },
    chromaticStrength: { value: 0 },
    distortionStrength: { value: 0 },
    time: { value: 0 },
    energyIntensity: { value: 0 }
  };

  var portalVertShader = [
    "varying vec2 vUv;",
    "void main() {",
    "  vUv = uv;",
    "  gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);",
    "}"
  ].join("\n");

  var portalFragShader = [
    "uniform sampler2D tFront;",
    "uniform float portalRadius;",
    "uniform vec2 portalCenter;",
    "uniform float edgeWidth;",
    "uniform vec3 glowColor;",
    "uniform vec3 glowColor2;",
    "uniform float chromaticStrength;",
    "uniform float distortionStrength;",
    "uniform float time;",
    "uniform float energyIntensity;",
    "varying vec2 vUv;",
    "float hash(vec2 p) {",
    "  return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);",
    "}",
    "float noise(vec2 p) {",
    "  vec2 i = floor(p);",
    "  vec2 f = fract(p);",
    "  f = f * f * (3.0 - 2.0 * f);",
    "  float a = hash(i);",
    "  float b = hash(i + vec2(1.0, 0.0));",
    "  float c = hash(i + vec2(0.0, 1.0));",
    "  float d = hash(i + vec2(1.0, 1.0));",
    "  return mix(mix(a, b, f.x), mix(c, d, f.x), f.y);",
    "}",
    "void main() {",
    "  vec2 uv = vUv;",
    "  vec2 aspect = vec2(" + (W / H).toFixed(4) + ", 1.0);",
    "  vec2 centered = (uv - portalCenter) * aspect;",
    "  float dist = length(centered);",
    "  float angle = atan(centered.y, centered.x);",
    "  float edgeNoise = noise(vec2(angle * 3.0, time * 2.0)) * 0.03 * energyIntensity;",
    "  float portalEdge = portalRadius + edgeNoise;",
    "  float edgeDist = abs(dist - portalEdge);",
    "  float distortMask = smoothstep(edgeWidth * 1.5, 0.0, edgeDist) * distortionStrength;",
    "  vec2 distortDir = normalize(centered + 0.0001);",
    "  vec2 distortedUv = uv + distortDir * distortMask * sin(angle * 8.0 + time * 5.0);",
    "  float chromaMask = smoothstep(edgeWidth * 2.0, 0.0, edgeDist) * chromaticStrength;",
    "  vec2 chromaOffset = distortDir * chromaMask;",
    "  float r = texture2D(tFront, distortedUv + chromaOffset).r;",
    "  float g = texture2D(tFront, distortedUv).g;",
    "  float b = texture2D(tFront, distortedUv - chromaOffset).b;",
    "  vec3 frontColor = vec3(r, g, b);",
    "  float mask = smoothstep(portalEdge - 0.008, portalEdge + 0.008, dist);",
    "  float glowInner = smoothstep(edgeWidth, 0.0, edgeDist);",
    "  float glowOuter = smoothstep(edgeWidth * 2.5, edgeWidth * 0.5, edgeDist);",
    "  float glow = glowInner * glowOuter * energyIntensity;",
    "  float colorPhase = fract(angle / 6.2832 + time * 0.4);",
    "  vec3 ringColor = mix(glowColor, glowColor2, sin(colorPhase * 6.2832) * 0.5 + 0.5);",
    "  float sparks = noise(vec2(angle * 12.0, time * 8.0));",
    "  sparks = pow(sparks, 4.0) * glowInner * energyIntensity * 2.0;",
    "  vec3 finalColor = frontColor * mask;",
    "  finalColor += ringColor * glow * 2.5;",
    "  finalColor += vec3(1.0, 0.9, 1.0) * sparks;",
    "  float alpha = mask + glow * 0.5 + sparks * 0.3;",
    "  alpha = clamp(alpha, 0.0, 1.0);",
    "  gl_FragColor = vec4(finalColor, alpha);",
    "}"
  ].join("\n");

  var portalMat = new THREE.ShaderMaterial({
    uniforms: portalUniforms,
    vertexShader: portalVertShader,
    fragmentShader: portalFragShader,
    transparent: true,
    depthWrite: false,
    side: THREE.FrontSide
  });
  portalFrontQuad = new THREE.Mesh(new THREE.PlaneGeometry(quadW, quadH), portalMat);
  portalScene.add(portalFrontQuad);

  window.renderPortalReveal = function(time) {
    portalUniforms.portalRadius.value = portalState.portalRadius;
    portalUniforms.edgeWidth.value = portalState.edgeWidth;
    portalUniforms.chromaticStrength.value = portalState.chromaticStrength;
    portalUniforms.distortionStrength.value = portalState.distortionStrength;
    portalUniforms.time.value = time;
    portalUniforms.energyIntensity.value = portalState.energyIntensity;
    portalRenderer.render(portalScene, portalCamera);
  };

  portalReady = true;
  window.renderPortalReveal(0);
}
