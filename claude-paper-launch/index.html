  <script>
    // Master timeline drives ONLY the cross-section opacity crossfades (no padding).
    // Section visibility windows are owned by the framework; we only blend the seams.
    window.__timelines = window.__timelines || {};
    const rootTimeline = gsap.timeline({ paused: true });

    // seam 1 (connector → chat) is a HARD CUT at 6.7s — comp1's end composer is built to match
    // comp2's composer pixel-for-pixel (layout, weight, shadow, cursor), so no blend is needed.

    // only the response section needs to start hidden (for the seam-2 crossfade)
    rootTimeline.set("#sec-response", { opacity: 0 }, 0);

    // seam 2 (chat → response): thinking dissolves out as the answer fades in (message + composer
    // sit at identical positions in both, so they stay rock-steady through the 0.6s crossfade)
    rootTimeline.to("#sec-response", { opacity: 1, duration: 0.6, ease: "power1.inOut" }, 13.0);
    rootTimeline.to("#sec-chat", { opacity: 0, duration: 0.6, ease: "power1.inOut" }, 13.0);

    // seam 3 (follow-up → thinking) = INVERSE zoom-through. Outbound scene scales DOWN (recedes +
    // blurs + dims); hard cut at peak blur; the giant thinking enters scaled UP (1.25) and settles
    // to 1. Both move in the shrinking direction (velocity-matched), just like zoom-through reversed.
    rootTimeline.set("#sec-thinking", { opacity: 0 }, 0);
    const CUT = 25.2;
    rootTimeline.to("#sec-followup", { scale: 0.8, filter: "blur(20px)", duration: 0.2, ease: "power3.in" }, CUT - 0.2);
    rootTimeline.to("#sec-followup", { opacity: 0.15, duration: 0.2, ease: "none" }, CUT - 0.2);
    rootTimeline.set("#sec-followup", { opacity: 0 }, CUT);
    rootTimeline.set("#sec-thinking", { opacity: 0.15, scale: 1.25, filter: "blur(20px)" }, CUT);
    rootTimeline.to("#sec-thinking", { scale: 1, filter: "blur(0px)", opacity: 1, duration: 0.5, ease: "expo.out" }, CUT);

    // seam 4 (thinking → compose UI) = same INVERSE zoom-through. Each thinking word holds ~0.7s;
    // after "Rendering" the giant thinking scales down + blurs out, then the compose tool window
    // enters scaled up (1.25) and settles to its 75% size.
    rootTimeline.set("#sec-compose", { opacity: 0 }, 0);
    const CUT2 = 26.0;
    rootTimeline.to("#sec-thinking", { scale: 0.8, filter: "blur(20px)", duration: 0.2, ease: "power3.in" }, CUT2 - 0.2);
    rootTimeline.to("#sec-thinking", { opacity: 0.15, duration: 0.2, ease: "none" }, CUT2 - 0.2);
    rootTimeline.set("#sec-thinking", { opacity: 0 }, CUT2);
    rootTimeline.set("#sec-compose", { opacity: 0.15, scale: 1.25, filter: "blur(20px)" }, CUT2);
    rootTimeline.to("#sec-compose", { scale: 1, filter: "blur(0px)", opacity: 1, duration: 0.5, ease: "expo.out" }, CUT2);

    // seam 5 (compose → "Sure.") = a LEFTWARD CUT THE CURVE. After the cursor taps send it sweeps
    // left and accelerates off-frame; we HARD-CUT mid-sweep (no transition frames) to the giant
    // Claude reply, which is already sliding left (entering from the right) so the motion carries.
    rootTimeline.set("#sec-sure", { opacity: 0 }, 0);
    const CUT3 = 38.8;
    // outgoing: the whole compose scene THROWS left, accelerating into the cut (power2.in), so it's
    // moving when we cut — velocity carries into "Sure." sliding left. Behind it is only paper, so
    // the exposed right edge stays seamless. Cut mid-throw (scene still mostly on-frame).
    rootTimeline.to("#sec-compose", { xPercent: -13, duration: 0.26, ease: "power2.in" }, CUT3 - 0.26);
    // …and fades 1 → 0.55 as it goes — the exact inverse of "Sure." fading 0.55 → 1 on entry.
    rootTimeline.to("#sec-compose", { opacity: 0.55, duration: 0.26, ease: "power2.in" }, CUT3 - 0.26);
    rootTimeline.set("#sec-compose", { opacity: 0 }, CUT3);
    rootTimeline.set("#sec-sure", { opacity: 1 }, CUT3);

    // seam 6 ("Sure." → thinking "Making your video…") = INVERSE zoom-through, identical to seams 3/4.
    // "Sure." scales DOWN (recedes + blurs + dims); hard cut at peak blur; the giant thinking enters
    // scaled UP (1.25) and settles to 1. Both move in the shrinking direction (velocity-matched).
    rootTimeline.set("#sec-thinking2", { opacity: 0 }, 0);
    const CUT4 = 39.2;
    rootTimeline.to("#sec-sure", { scale: 0.8, filter: "blur(20px)", duration: 0.2, ease: "power3.in" }, CUT4 - 0.2);
    rootTimeline.to("#sec-sure", { opacity: 0.15, duration: 0.2, ease: "none" }, CUT4 - 0.2);
    rootTimeline.set("#sec-sure", { opacity: 0 }, CUT4);
    rootTimeline.set("#sec-thinking2", { opacity: 0.15, scale: 1.25, filter: "blur(20px)" }, CUT4);
    rootTimeline.to("#sec-thinking2", { scale: 1, filter: "blur(0px)", opacity: 1, duration: 0.5, ease: "expo.out" }, CUT4);

    // seam 7 ("Making your video…" → compose task list) = LEFTWARD CUT THE CURVE, same as seam 5.
    // "Making your video…" THROWS left (accelerating into the cut) and fades 1 → 0.55; we HARD-CUT
    // mid-throw to the task list, which is already sliding left (its window enters x:210 → 0, 0.55 → 1)
    // so the leftward motion carries across the cut. Behind both is paper, so exposed edges stay seamless.
    rootTimeline.set("#sec-tasklist", { opacity: 0 }, 0);
    const CUT5 = 40.3;
    rootTimeline.to("#sec-thinking2", { xPercent: -13, duration: 0.26, ease: "power2.in" }, CUT5 - 0.26);
    rootTimeline.to("#sec-thinking2", { opacity: 0.55, duration: 0.26, ease: "power2.in" }, CUT5 - 0.26);
    rootTimeline.set("#sec-thinking2", { opacity: 0 }, CUT5);
    rootTimeline.set("#sec-tasklist", { opacity: 1 }, CUT5);

    // seam 8 (compose task list → outro) = LEFTWARD CUT THE CURVE, same as seams 5/6. Right after the
    // cursor taps download, the whole compose card THROWS left (accelerating) + fades 1 → 0.55; we
    // HARD-CUT mid-throw to the outro, whose "HyperFrames MCP" title is already sliding left (entering
    // from the right) so the motion carries. Exposed edges are paper, so the seam stays seamless.
    rootTimeline.set("#sec-outro", { opacity: 0 }, 0);
    const CUT6 = 49.9;
    rootTimeline.to("#sec-tasklist", { xPercent: -13, duration: 0.26, ease: "power2.in" }, CUT6 - 0.26);
    rootTimeline.to("#sec-tasklist", { opacity: 0.55, duration: 0.26, ease: "power2.in" }, CUT6 - 0.26);
    rootTimeline.set("#sec-tasklist", { opacity: 0 }, CUT6);
    rootTimeline.set("#sec-outro", { opacity: 1 }, CUT6);

    window.__timelines["claude-paper"] = rootTimeline;
  </script>
