<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Intro Mockup 03 — timing is tricky</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet">
  <style>
    html, body { margin: 0; padding: 0; background: #222; }
    .frame {
      width: 1920px; height: 1080px;
      background: #f5f5f7;
      color: #1d1d1f;
      font-family: 'Inter', sans-serif;
      position: relative; overflow: hidden;
      margin: 0 auto;
    }
    /* "timing" — huge sans, top-left diagonal */
    .timing {
      position: absolute;
      top: 70px;
      left: 80px;
      font-family: 'Inter', sans-serif;
      font-weight: 900;
      font-size: 420px;
      letter-spacing: -0.05em;
      line-height: 0.85;
      color: #1d1d1f;
    }
    /* "is" — small italic serif, tucked between */
    .is {
      position: absolute;
      top: 500px;
      left: 820px;
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-weight: 700;
      font-size: 220px;
      letter-spacing: -0.02em;
      line-height: 1;
      color: #1d1d1f;
      transform: rotate(-4deg);
    }
    /* bell — big accent between "is" and "tricky" */
    .bell {
      position: absolute;
      right: 620px;
      top: 560px;
      width: 280px; height: 280px;
      display: flex; align-items: center; justify-content: center;
      font-size: 280px;
      transform: rotate(-8deg);
    }
    /* "tricky." — massive, bottom-right, fills corner */
    .tricky {
      position: absolute;
      bottom: 60px;
      right: 80px;
      font-family: 'Inter', sans-serif;
      font-weight: 900;
      font-size: 500px;
      letter-spacing: -0.055em;
      line-height: 0.85;
      color: #1d1d1f;
      text-align: right;
    }
  </style>
</head>
<body>
  <div class="frame">
    <div class="timing">timing</div>
    <div class="is">is</div>
    <div class="bell">🔔</div>
    <div class="tricky">tricky.</div>
  </div>
</body>
</html>
