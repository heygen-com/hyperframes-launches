<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Intro Mockup 02 — for video editing, you know that</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;900&display=swap" rel="stylesheet">
  <style>
    html, body { margin: 0; padding: 0; background: #222; }
    .frame {
      width: 1920px; height: 1080px;
      background: #f5f5f7;
      color: #1d1d1f;
      font-family: 'Inter', sans-serif;
      position: relative; overflow: hidden;
      margin: 0 auto;
    }
    .stack {
      position: absolute;
      top: 50%; left: 0; right: 0;
      transform: translateY(-50%);
      display: flex; flex-direction: column;
      align-items: flex-start;
    }
    .line {
      font-family: 'Inter', sans-serif;
      font-weight: 900;
      letter-spacing: -0.045em;
      line-height: 0.88;
      color: #1d1d1f;
      white-space: nowrap;
    }
    .l1 { font-size: 200px;  margin-left: 160px; }
    .l2 { font-size: 440px;  margin-left: 220px; margin-top: -10px; }
    .l3 { font-size: 240px;  margin-left: 640px; margin-top: -6px; }
    .l4 { font-size: 300px;  margin-left: 380px; margin-top: -10px; }
  </style>
</head>
<body>
  <div class="frame">
    <div class="stack">
      <div class="line l1">for</div>
      <div class="line l2">video</div>
      <div class="line l3">editing before,</div>
      <div class="line l4">you know that</div>
    </div>
  </div>
</body>
</html>
