<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Act 2a · First Ask (keyframe)</title>
  <style>
    html, body { margin: 0; width: 1920px; height: 1080px; overflow: hidden;
      background: #F5F4ED; color: #3D3929;
      font-family: ui-sans-serif, "Söhne", "Inter", system-ui, -apple-system, sans-serif;
    }
    .app { position: relative; width: 1920px; height: 1080px; display: flex; flex-direction: column; }

    .topbar {
      height: 64px; padding: 0 28px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid #EBE7DB; background: #FAF9F5;
    }
    .topbar-left, .topbar-right { display: flex; align-items: center; gap: 14px; }
    .icon-btn {
      width: 36px; height: 36px; color: #6B6757;
      display: flex; align-items: center; justify-content: center;
    }
    .project-name { font-size: 18px; color: #3D3929; font-weight: 500; }
    .model-pill {
      display: flex; align-items: center; gap: 8px;
      font-size: 15px; color: #6B6757;
      padding: 8px 14px; border-radius: 999px;
      background: #F0ECE0; border: 1px solid #E5E0D1;
    }
    .avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: #D97757; color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-weight: 600; font-size: 15px;
    }

    .thread {
      flex: 1; padding: 80px 0 0 0;
      display: flex; flex-direction: column; align-items: center; gap: 48px;
    }
    .msg-user {
      width: 900px; display: flex; justify-content: flex-end;
    }
    .msg-user .bubble {
      max-width: 620px; padding: 18px 24px;
      background: #F0ECE0; border: 1px solid #E5E0D1;
      border-radius: 18px;
      font-size: 22px; line-height: 1.5; color: #3D3929;
    }
    .msg-claude {
      width: 900px; display: flex; gap: 18px; align-items: flex-start;
    }
    .claude-mark {
      width: 40px; height: 40px; flex: 0 0 40px;
      border-radius: 10px; background: #FFFFFF; border: 1px solid #E5E0D1;
      display: flex; align-items: center; justify-content: center;
    }
    .claude-body { padding-top: 6px; }
    .claude-text {
      font-size: 24px; line-height: 1.55; color: #2A2720; font-weight: 400;
    }
    .caret { color: #D97757; margin-left: 2px; }

    .composer-wrap {
      padding: 0 0 44px;
      display: flex; flex-direction: column; align-items: center; gap: 14px;
    }
    .composer {
      width: 900px; min-height: 108px;
      background: #FFFFFF; border: 1px solid #E5E0D1;
      border-radius: 22px;
      box-shadow: 0 2px 12px rgba(61, 57, 41, 0.04);
      padding: 22px 22px 16px;
      display: flex; flex-direction: column; justify-content: space-between;
    }
    .composer-text { font-size: 20px; color: #B3AD99; min-height: 28px; }
    .composer-actions { display: flex; justify-content: flex-end; align-items: center; gap: 10px; }
    .attach { width: 36px; height: 36px; color: #8C8674;
      display: flex; align-items: center; justify-content: center; }
    .send { width: 36px; height: 36px; border-radius: 10px;
      background: #D97757;
      display: flex; align-items: center; justify-content: center; }
    .composer-meta { font-size: 13px; color: #A19B87; }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="topbar-left">
        <div class="icon-btn">
          <svg viewBox="0 0 24 24" width="20" height="20"><path d="M3 6h18M3 12h18M3 18h18" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" fill="none"/></svg>
        </div>
        <svg viewBox="0 0 32 32" width="26" height="26"><g fill="#D97757"><path d="M16 2 L17.4 12.6 L21.2 4.8 L18.7 13.3 L26.2 8.2 L19.5 14.8 L29.4 14 L19.6 16.6 L28 21.6 L18.8 17.8 L22.5 27.2 L16.8 18.4 L15.4 28.8 L14.7 18.2 L9.2 27.2 L13 17.8 L3.8 21.6 L12.3 16.6 L2.6 14 L12.4 14.8 L5.8 8.2 L13.3 13.3 L10.8 4.8 L14.6 12.6 Z"/></g></svg>
        <div class="project-name">Timeline Editor Launch</div>
      </div>
      <div class="topbar-right">
        <div class="model-pill">
          Claude Opus 4.7
          <svg viewBox="0 0 12 12" width="11" height="11"><path d="M3 5l3 3 3-3" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg>
        </div>
        <div class="avatar">J</div>
      </div>
    </div>

    <div class="thread">
      <div class="msg-user">
        <div class="bubble">Can you move the sound effect 0.1s earlier?</div>
      </div>
      <div class="msg-claude">
        <div class="claude-mark">
          <svg viewBox="0 0 32 32" width="22" height="22"><g fill="#D97757"><path d="M16 2 L17.4 12.6 L21.2 4.8 L18.7 13.3 L26.2 8.2 L19.5 14.8 L29.4 14 L19.6 16.6 L28 21.6 L18.8 17.8 L22.5 27.2 L16.8 18.4 L15.4 28.8 L14.7 18.2 L9.2 27.2 L13 17.8 L3.8 21.6 L12.3 16.6 L2.6 14 L12.4 14.8 L5.8 8.2 L13.3 13.3 L10.8 4.8 L14.6 12.6 Z"/></g></svg>
        </div>
        <div class="claude-body">
          <div class="claude-text">Done.<span class="caret">▍</span></div>
        </div>
      </div>
    </div>

    <div class="composer-wrap">
      <div class="composer">
        <div class="composer-text">How can I help you today?</div>
        <div class="composer-actions">
          <div class="attach">
            <svg viewBox="0 0 24 24" width="18" height="18"><path d="M21 11.5l-8.5 8.5a5 5 0 1 1-7-7l8.5-8.5a3.5 3.5 0 1 1 5 5L11 17.5a2 2 0 1 1-3-3l7-7" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg>
          </div>
          <div class="send">
            <svg viewBox="0 0 24 24" width="16" height="16"><path d="M12 5v14M5 12l7-7 7 7" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
        </div>
      </div>
      <div class="composer-meta">Claude can make mistakes. Please double-check responses.</div>
    </div>
  </div>
</body>
</html>
