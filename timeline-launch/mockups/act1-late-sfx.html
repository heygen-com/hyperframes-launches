<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Act 1 · Late SFX (keyframe)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Mono:wght@400;700&display=swap">
  <style>
    html, body { margin: 0; width: 1920px; height: 1080px; overflow: hidden; background: #000; }
    .stage {
      position: relative;
      width: 1920px;
      height: 1080px;
      font-family: "Space Mono", ui-monospace, monospace;
      background:
        radial-gradient(1200px 800px at 50% 52%, #1b1b1f 0%, #0b0b0d 70%),
        #0b0b0d;
      overflow: hidden;
    }
    .grain {
      position: absolute; inset: 0; opacity: 0.06; pointer-events: none;
      background-image: repeating-linear-gradient(0deg, rgba(255,255,255,0.08) 0 1px, transparent 1px 3px);
      mix-blend-mode: overlay;
    }
    .label-top, .label-bottom {
      position: absolute; left: 50%; transform: translateX(-50%);
      color: #7a7a7a; text-transform: uppercase;
      font-size: 22px; font-weight: 500;
    }
    .label-top { top: 120px; letter-spacing: 0.42em; }
    .label-bottom { bottom: 120px; letter-spacing: 0.3em; }

    .button-wrap {
      position: absolute; left: 50%; top: 50%;
      width: 560px; height: 560px;
      transform: translate(-50%, -50%);
    }
    .button-shadow {
      position: absolute; inset: 30px 0 0 0; border-radius: 50%;
      background: #6b0a07; filter: blur(1px);
    }
    .button-ring {
      position: absolute; inset: -26px; border-radius: 50%;
      border: 4px dashed rgba(255, 214, 10, 0.55);
    }
    .button {
      position: absolute; inset: 0 0 24px 0; border-radius: 50%;
      background: radial-gradient(circle at 42% 32%, #ff6b60 0%, #ff3b30 45%, #d0271e 100%);
      box-shadow:
        inset 0 -26px 40px rgba(0, 0, 0, 0.3),
        inset 0 14px 30px rgba(255, 255, 255, 0.18),
        0 0 0 6px rgba(255, 59, 48, 0.08);
      color: #fff8f6;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 14px;
      /* Pressed-in state (click just happened) */
      transform: translateY(14px) scale(0.96);
      filter: brightness(1.2);
    }
    .speaker { width: 96px; height: 96px; opacity: 0.95; }
    .button-text {
      font-family: "Archivo Black", sans-serif;
      font-size: 108px; font-weight: 900; letter-spacing: 0.02em;
      color: #fff8f6; text-shadow: 0 3px 0 rgba(0, 0, 0, 0.25);
    }

    /* Late-SFX visual burst — caught mid-fire */
    .ring {
      position: absolute; left: 50%; top: 50%;
      width: 560px; height: 560px;
      margin: -280px 0 0 -280px;
      border-radius: 50%;
      border: 6px solid #ffd60a;
      transform: scale(1.2);
      opacity: 0.5;
    }
    .ring-2 {
      border-color: #ff3b30; border-width: 4px;
      transform: scale(1.45); opacity: 0.35;
    }
    .honk-burst {
      position: absolute; left: 50%; top: 50%;
      transform: translate(-50%, -50%) rotate(-6deg) scale(1);
    }
    .honk-word {
      font-family: "Archivo Black", sans-serif;
      font-size: 180px; font-weight: 900;
      color: #ffd60a; letter-spacing: -0.02em;
      text-shadow: 6px 6px 0 #ff3b30, -2px -2px 0 #ffffff;
    }

    .cursor {
      position: absolute; left: 950px; top: 548px;
      width: 48px; height: 48px;
      filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.5));
    }

    /* Annotation (visible in mockup only) */
    .anno {
      position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
      font-family: "Space Mono", monospace;
      color: #ffd60a; font-size: 18px; letter-spacing: 0.15em;
      text-transform: uppercase; opacity: 0.5;
    }
  </style>
</head>
<body>
  <div class="stage">
    <div class="grain"></div>

    <div class="label-top">SOUND TEST</div>
    <div class="label-bottom">press&nbsp;&nbsp;to&nbsp;&nbsp;honk</div>

    <div class="button-wrap">
      <div class="button-shadow"></div>
      <div class="button-ring"></div>
      <div class="button">
        <svg class="speaker" viewBox="0 0 64 64">
          <path d="M14 24h10l14-10v36L24 40H14z" fill="currentColor" />
          <path d="M46 22c4 3 4 17 0 20M52 16c8 6 8 26 0 32"
            stroke="currentColor" stroke-width="4" fill="none" stroke-linecap="round" />
        </svg>
        <div class="button-text">HONK</div>
      </div>
    </div>

    <div class="ring ring-1"></div>
    <div class="ring ring-2"></div>
    <div class="honk-burst">
      <div class="honk-word">HONK!</div>
    </div>

    <svg class="cursor" viewBox="0 0 24 24">
      <path d="M4 2 L4 20 L9 15 L12 22 L15 20.5 L12 14 L19 14 Z"
        fill="#ffffff" stroke="#000000" stroke-width="1.2" stroke-linejoin="round" />
    </svg>

    <div class="anno">KEYFRAME · CLICK + 0.28s · LATE SFX BURST</div>
  </div>
</body>
</html>
