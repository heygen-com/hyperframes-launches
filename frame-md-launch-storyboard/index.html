<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <title>Frame.md Launch</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Just+Another+Hand&display=swap" rel="stylesheet">
  <link href="render-styles.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  <style>
    * { box-sizing: border-box; letter-spacing: 0; }
    html, body {
      margin: 0;
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      background: #f7f7f5;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    #frame-md-launch {
      position: relative;
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      background: #f7f7f5;
    }
    #scene-01-hook,
    #scene-02-diagnosis,
    #scene-03-missing-layer,
    #scene-04-frame-md-built,
    #scene-05-ui-flow,
    #scene-06-text-to-frame,
    #scene-07-new-format,
    #scene-08-close {
      position: absolute;
      inset: 0;
    }
    #scene-01-hook {
      z-index: 11;
    }
    #scene-02-diagnosis {
      z-index: 1;
    }
    #scene-03-missing-layer {
      z-index: 2;
    }
    #scene-04-frame-md-built {
      z-index: 3;
    }
    #scene-05-ui-flow {
      z-index: 4;
    }
    #scene-06-text-to-frame {
      z-index: 5;
    }
    #scene-07-new-format {
      z-index: 6;
    }
    #scene-08-close {
      z-index: 7;
    }
    #quiet-captions {
      position: absolute;
      inset: 0;
      z-index: 10;
      pointer-events: none;
    }
  </style>
</head>
