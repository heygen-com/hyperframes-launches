<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=block');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1920px; height: 1080px; overflow: hidden; background: #fff; font-family: 'Inter', sans-serif; }

  #scene-09 {
    position: relative;
    width: 1920px;
    height: 1080px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #fff;
  }

  .line {
    position: absolute;
    font-size: 94px;
    font-weight: 800;
    letter-spacing: -0.03em;
    color: #0a0a0a;
    white-space: nowrap;
    opacity: 0;
  }

  .logo {
    position: absolute;
    opacity: 0;
  }

  .logo img {
    width: 1440px;
    height: auto;
  }
</style>
</head>
<body>
<div id="scene-09" data-composition-id="scene-09" data-width="1920" data-height="1080" data-duration="3.6">

  <span class="line" id="line-a"><span style="color:#35C838">Scale</span> your best work.</span>
  <span class="line" id="line-b">Not your <span style="color:#F3A6FF">workload.</span></span>
  <div class="logo" id="logo"><img src="../assets/hyperframes-dark.svg" /></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script>
window.__timelines = window.__timelines || {};
var tl = gsap.timeline({ paused: true });

// Upward cut-the-curve entry for first line (matching scene 08 upward exit)
tl.fromTo("#line-a", { y: 200, filter: "blur(8px)", opacity: 0 }, { y: 0, filter: "blur(0px)", opacity: 1, duration: 0.42, ease: "expo.out" }, 0.15);
tl.to("#line-a", { x: -60, opacity: 0, duration: 0.35, ease: "power2.in" }, 1.2);
tl.fromTo("#line-b", { x: 60, opacity: 0 }, { x: 0, opacity: 1, duration: 0.4, ease: "power2.out" }, 1.8);

// 0.4s after "Not your workload" appears → upward cut-the-curve exit
tl.to("#line-b", {
  y: -200, filter: "blur(8px)", opacity: 0,
  duration: 0.33, ease: "power2.in"
}, 2.2);

// Logo slides up into place (cut-the-curve entry from below)
gsap.set("#logo", { y: 200, filter: "blur(8px)", opacity: 0 });
tl.to("#logo", { y: 0, filter: "blur(0px)", opacity: 1, duration: 0.33, ease: "expo.out" }, 2.53);

tl.to({}, { duration: 3.6 }, 0);
window.__timelines["scene-09"] = tl;
</script>
</body>
</html>
